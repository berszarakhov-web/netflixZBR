services:
  - type: web
    name: timeline-app
    env: node
    plan: starter
    region: singapore
    buildCommand: npm run build && npm run build:backend
    startCommand: node project/backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        scope: secret
      - key: JWT_SECRET
        scope: secret
      - key: FRONTEND_URL
        value: https://timeline-app.onrender.com
